<!doctype html>
<html>
  <head>
    <style>
      table {
        border-collapse: collapse;
        margin: 20px;
      }
      td {
        border: 2px solid black;
        width: 70px;
        height: 45px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <table>
      <tr>
        <td rowspan="3">1</td>
        <td colspan="4">2</td>
      </tr>

      <tr>
        <td colspan="2">3</td>
        <td colspan="2" rowspan="2">4</td>
      </tr>

      <tr>
        <td colspan="2">5</td>
      </tr>

      <tr>
        <td rowspan="2">6</td>
        <td rowspan="2">7</td>
        <td rowspan="2">8</td>
        <td colspan="2">9</td>
      </tr>

      <tr>
        <td colspan="2">10</td>
      </tr>

      <tr>
        <td rowspan="3">11</td>
        <td colspan="2">12</td>
        <td colspan="2">13</td>
      </tr>

      <tr>
        <td colspan="2">14</td>
        <td>15</td>
        <td></td>
      </tr>

      <tr>
        <td colspan="2">16</td>
        <td colspan="2"></td>
      </tr>

      <tr>
        <td>17</td>
        <td>18</td>
        <td>19</td>
        <td colspan="2">20</td>
      </tr>
    </table>
  </body>
</html>
