<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Showcase</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="hero">
      <h1>Discover Nature</h1>
      <p>Explore the beauty of the wilderness through our lens.</p>
    </section>

    <main class="container">
      <article class="card">
        <img src="https://picsum.photos/id/1016/600/400" alt="Mountains" />
        <div class="card-body">
          <h2>The Great Peaks</h2>
          <p>
            Majestic mountains rising into the clouds, offering a challenge to
            every adventurer.
          </p>
          <a href="#" class="btn">Read More</a>
        </div>
      </article>

      <article class="card">
        <img src="https://picsum.photos/id/1019/600/400" alt="Forest" />
        <div class="card-body">
          <h2>Deep Woodlands</h2>
          <p>
            Lush green forests where the air is fresh and the wildlife thrives
            in harmony.
          </p>
          <a href="#" class="btn">Read More</a>
        </div>
      </article>
      <a href="google.com"></a>
    </main>
  </body>
</html>
