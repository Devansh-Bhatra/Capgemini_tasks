<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        border-collapse: collapse;
        margin: 20px;
      }
      td {
        border: 2px solid black;
        width: 70px;
        height: 45px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <table border="1">
      <thead>
        <tr>
          <td rowspan="3">1</td>
          <td colspan="5">2</td>
        </tr>
        <tr>
          <td colspan="2">3</td>
          <td colspan="3" rowspan="2">4</td>
        </tr>
        <tr>
          <td colspan="2">5</td>
        </tr>
        <tr>
          <td rowspan="2">6</td>
          <td rowspan="2">7</td>
          <td rowspan="2">8</td>
          <td colspan="3">9</td>
        </tr>
        <tr>
          <td colspan="3">10</td>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="3">11</td>
          <td colspan="2">12</td>
          <td colspan="3">13</td>
        </tr>
        <tr>
          <td colspan="2">14</td>
          <td colspan="3">15</td>
        </tr>
        <tr>
          <td colspan="2">16</td>
        </tr>
        <tr>
          <td>17</td>
          <td>18</td>
          <td>19</td>
          <td colspan="3">20</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
