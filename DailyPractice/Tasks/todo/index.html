<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="main">
      <div class="todo">
        <div class="left">
          <h1>Todo App</h1>
          <p>Add the todo to your upcoming tasks</p>
          <input required type="text" placeholder="Enter your task" />
          <button>Add Task</button>
        </div>
        <div class="right">
          <h1>Your Tasks</h1>
          <div class="tasks"></div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
